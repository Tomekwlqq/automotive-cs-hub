<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Samochody osobowe — nabywca prywatny — CS + Mapa Percepcji</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,Segoe UI,sans-serif;background:#f6f8fa;color:#1f2328}
.tabs{display:flex;background:#fff;border-bottom:2px solid #d0d7de;position:sticky;top:0;z-index:100}
.tab{padding:12px 28px;cursor:pointer;font-size:14px;font-weight:600;color:#57606a;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab:hover{color:#0969da}
.tab.active{color:#0969da;border-bottom-color:#0969da}
.panel{display:none}
.panel.active{display:block}
iframe{width:100%;border:none;height:calc(100vh - 48px)}
.note{padding:20px;font-size:13px;color:#57606a;text-align:center;background:#fff8c5;border-bottom:1px solid #d0d7de}
</style>
</head>
<body>
<div class="note">📌 Widok lokalny: pliki HTML muszą być otwarte razem. Na GitHub Pages wszystkie 3 pliki z folderu /docs/.</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab(this,'mapa')">🗺️ Mapa percepcji (79 pytań)</button>
  <button class="tab" onclick="switchTab(this,'cs')">📄 Category Standards CS-1</button>
  <button class="tab" onclick="switchTab(this,'combined')">🔗 Łączny widok</button>
</div>
<div id="tab-mapa" class="panel active"><iframe src="MAPA_PERCEPCJI_samochody_osobowe_prywatny_v5.5.html"></iframe></div>
<div id="tab-cs" class="panel"><iframe src="cs_samochody_osobowe_prywatny.html"></iframe></div>
<div id="tab-combined" class="panel" style="display:flex;height:calc(100vh - 80px)">
  <iframe src="MAPA_PERCEPCJI_samochody_osobowe_prywatny_v5.5.html" style="width:50%;height:100%;border-right:1px solid #d0d7de"></iframe>
  <iframe src="cs_samochody_osobowe_prywatny.html" style="width:50%;height:100%"></iframe>
</div>
<script>
function switchTab(btn, id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>{p.classList.remove('active');p.style.display='none'});
  btn.classList.add('active');
  const panel = document.getElementById('tab-'+id);
  panel.classList.add('active');
  panel.style.display = id==='combined' ? 'flex' : 'block';
}
</script>
</body>
</html>
